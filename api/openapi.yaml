openapi: 3.0.3
info:
  title: Inroad API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '400': { description: Validation error }
        '409': { description: Workspace or email already exists }
  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '401': { description: Invalid credentials }
  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [auth]
      security: []
      responses:
        '200':
          description: Refreshed session
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionResponse' }
        '401': { description: Invalid or expired refresh token }
  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      security: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string } } }
  /auth/me:
    get:
      operationId: authMe
      tags: [auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Current identity
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401': { description: Unauthorized }
  /auth/logout-all:
    post:
      operationId: authLogoutAll
      tags: [auth]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out of all sessions
          content:
            application/json:
              schema: { type: object, properties: { status: { type: string } } }
        '401': { description: Unauthorized }
  /auth/switch-workspace:
    post:
      operationId: authSwitchWorkspace
      tags: [auth]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SwitchWorkspaceRequest' }
      responses:
        '200':
          description: Switched active workspace
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SwitchWorkspaceResponse' }
        '401': { description: Unauthorized }
        '403': { description: Not a member of the target workspace }
  /mailboxes:
    get:
      operationId: listMailboxes
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Mailboxes in the workspace
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Mailbox' } }
        '401': { description: Unauthorized }
    post:
      operationId: connectMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConnectMailboxRequest' }
      responses:
        '200':
          description: Connected mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '409': { description: Mailbox already exists }
        '422': { description: Connection test failed }
  /mailboxes/{id}:
    get:
      operationId: getMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    delete:
      operationId: deleteMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /mailboxes/{id}/pause:
    post:
      operationId: pauseMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Paused mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /mailboxes/{id}/resume:
    post:
      operationId: resumeMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Resumed mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /lists:
    get:
      operationId: listLists
      tags: [lists]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Lists, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/List' } } } } }
        '401': { description: Unauthorized }
    post:
      operationId: createList
      tags: [lists]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [name], properties: { name: { type: string } } } } }
      responses:
        '200': { description: Created list, content: { application/json: { schema: { $ref: '#/components/schemas/List' } } } }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
  /contacts/import:
    post:
      operationId: importContacts
      tags: [contacts]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: list, in: query, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { type: object, properties: { file: { type: string, format: binary } } }
      responses:
        '200': { description: Import result, content: { application/json: { schema: { $ref: '#/components/schemas/ImportResult' } } } }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '404': { description: List not found }
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: list, in: query, required: true, schema: { type: string, format: uuid } }
        - { name: limit, in: query, schema: { type: integer, default: 50 } }
        - { name: offset, in: query, schema: { type: integer, default: 0 } }
      responses:
        '200': { description: Contacts, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Contact' } } } } }
        '401': { description: Unauthorized }
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Campaigns, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Campaign' } } } } }
        '401': { description: Unauthorized }
    post:
      operationId: createCampaign
      tags: [campaigns]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/CreateCampaignRequest' } } }
      responses:
        '200': { description: Created campaign, content: { application/json: { schema: { $ref: '#/components/schemas/Campaign' } } } }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '404': { description: List not found }
        '422': { description: Mailbox not active }
  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Campaign, content: { application/json: { schema: { $ref: '#/components/schemas/Campaign' } } } }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /campaigns/{id}/launch:
    post:
      operationId: launchCampaign
      tags: [campaigns]
      security: [{ bearerAuth: [] }]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        '200': { description: Queued count, content: { application/json: { schema: { type: object, properties: { queued: { type: integer } } } } } }
        '401': { description: Unauthorized }
        '404': { description: Not found }
        '409': { description: Already launched }
        '422': { description: Target list empty }
# Note: the public unsubscribe endpoint GET /u/{token} is served outside the
# /api/v1 base (browser-facing, returns HTML) and is intentionally not in this contract.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [workspace_name, email, password]
      properties:
        workspace_name: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    SessionResponse:
      type: object
      required: [access_token, expires_in, user_id, active_workspace_id, role, memberships]
      properties:
        access_token: { type: string }
        expires_in: { type: integer }
        user_id: { type: string }
        active_workspace_id: { type: string }
        role: { type: string }
        memberships:
          type: array
          items: { $ref: '#/components/schemas/Membership' }
    Membership:
      type: object
      required: [workspace_id, workspace_name, role]
      properties:
        workspace_id: { type: string }
        workspace_name: { type: string }
        role: { type: string }
    MeResponse:
      type: object
      required: [user_id, active_workspace_id, role, memberships]
      properties:
        user_id: { type: string }
        active_workspace_id: { type: string }
        role: { type: string }
        memberships:
          type: array
          items: { $ref: '#/components/schemas/Membership' }
    SwitchWorkspaceRequest:
      type: object
      required: [workspace_id]
      properties:
        workspace_id: { type: string }
    SwitchWorkspaceResponse:
      type: object
      required: [access_token, expires_in, active_workspace_id, role]
      properties:
        access_token: { type: string }
        expires_in: { type: integer }
        active_workspace_id: { type: string }
        role: { type: string }
    ConnectMailboxRequest:
      type: object
      required: [email, smtp_host, smtp_port, imap_host, imap_port, secret]
      properties:
        email: { type: string, format: email }
        display_name: { type: string }
        smtp_host: { type: string }
        smtp_port: { type: integer }
        smtp_username: { type: string }
        imap_host: { type: string }
        imap_port: { type: integer }
        imap_username: { type: string }
        secret: { type: string }
        use_tls: { type: boolean, default: true }
    Mailbox:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string }
        provider: { type: string }
        smtp_host: { type: string }
        smtp_port: { type: integer }
        smtp_username: { type: string }
        imap_host: { type: string }
        imap_port: { type: integer }
        imap_username: { type: string }
        use_tls: { type: boolean }
        daily_cap: { type: integer }
        min_interval_seconds: { type: integer }
        ramp_enabled: { type: boolean }
        ramp_start_cap: { type: integer }
        ramp_days: { type: integer }
        status: { type: string }
        last_error: { type: string }
        created_at: { type: string, format: date-time }
    List:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    ImportResult:
      type: object
      properties:
        imported: { type: integer }
        skipped: { type: integer }
        duplicates: { type: integer }
    Contact:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        first_name: { type: string }
    Campaign:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        subject: { type: string }
        status: { type: string }
        stats: { type: object, additionalProperties: { type: integer } }
    CreateCampaignRequest:
      type: object
      required: [name, mailbox_id, list_id, subject]
      properties:
        name: { type: string }
        mailbox_id: { type: string, format: uuid }
        list_id: { type: string, format: uuid }
        subject: { type: string }
        body_text: { type: string }
        body_html: { type: string }
