openapi: 3.0.3
info:
  title: Inroad API
  version: 0.1.0
servers:
  - url: /api/v1
paths:
  /workspaces/register:
    post:
      operationId: register
      tags: [workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Session token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400': { description: Validation error }
  /workspaces/login:
    post:
      operationId: login
      tags: [workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Session token
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401': { description: Invalid credentials }
  /mailboxes:
    get:
      operationId: listMailboxes
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Mailboxes in the workspace
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Mailbox' } }
        '401': { description: Unauthorized }
    post:
      operationId: connectMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConnectMailboxRequest' }
      responses:
        '200':
          description: Connected mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '400': { description: Validation error }
        '401': { description: Unauthorized }
        '409': { description: Mailbox already exists }
        '422': { description: Connection test failed }
  /mailboxes/{id}:
    get:
      operationId: getMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    delete:
      operationId: deleteMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Deleted }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /mailboxes/{id}/pause:
    post:
      operationId: pauseMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Paused mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
  /mailboxes/{id}/resume:
    post:
      operationId: resumeMailbox
      tags: [mailboxes]
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: Resumed mailbox
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Mailbox' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required: [workspace_name, email, password]
      properties:
        workspace_name: { type: string }
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      required: [token, workspace_id, user_id]
      properties:
        token: { type: string }
        workspace_id: { type: string }
        user_id: { type: string }
    ConnectMailboxRequest:
      type: object
      required: [email, smtp_host, smtp_port, imap_host, imap_port, secret]
      properties:
        email: { type: string, format: email }
        display_name: { type: string }
        smtp_host: { type: string }
        smtp_port: { type: integer }
        smtp_username: { type: string }
        imap_host: { type: string }
        imap_port: { type: integer }
        imap_username: { type: string }
        secret: { type: string }
        use_tls: { type: boolean, default: true }
    Mailbox:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string }
        display_name: { type: string }
        provider: { type: string }
        smtp_host: { type: string }
        smtp_port: { type: integer }
        smtp_username: { type: string }
        imap_host: { type: string }
        imap_port: { type: integer }
        imap_username: { type: string }
        use_tls: { type: boolean }
        daily_cap: { type: integer }
        min_interval_seconds: { type: integer }
        ramp_enabled: { type: boolean }
        ramp_start_cap: { type: integer }
        ramp_days: { type: integer }
        status: { type: string }
        last_error: { type: string }
        created_at: { type: string, format: date-time }
