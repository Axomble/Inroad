services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inroad
      POSTGRES_PASSWORD: inroad
      POSTGRES_DB: inroad
    ports: ["5433:5432"]   # host 5433 avoids clashing with a native Postgres on 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inroad"]
      interval: 3s
      timeout: 3s
      retries: 10
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
