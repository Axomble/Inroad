version: "2"
sql:
  - engine: "postgresql"
    schema: "internal/platform/db/migrations"
    queries: "internal/platform/db/queries"
    gen:
      go:
        package: "gen"
        out: "internal/platform/db/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
